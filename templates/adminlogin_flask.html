{% extends "base_flask.html" %}
{% block content %}
<div class="Request-bg">
    <div class="container">
        <div class="row">
            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                <div class="abouttitle">
                    <h2>Admin Access</h2>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="Request">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="titlepage3">
                    <h2>Administrator Login</h2>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12">
                <form method="post" action="/adminlogin">
                    <div class="form-group">
                        <input class="form-control" placeholder="Admin Username" name="username" type="text" required>
                    </div>
                    <div class="form-group">
                        <input class="form-control" placeholder="Admin Password" name="password" type="password"
                            required>
                    </div>
                    <button class="send-btn" type="submit">Admin Login</button>
                </form>
                <p style="margin-top: 10px; font-size: 0.9em; color: #666;">Note: Use admin / admin</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
