{% extends "base_flask.html" %}
{% block content %}
<div class="Request-bg">
    <div class="container">
        <div class="row">
            <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
                <div class="abouttitle">
                    <h2>User Registration</h2>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="Request">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="titlepage3">
                    <h2>Create an Account</h2>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12">
                <form method="post" action="/register">
                    <div class="form-group">
                        <input class="form-control" placeholder="First Name" name="fname" type="text" required>
                    </div>
                    <div class="form-group">
                        <input class="form-control" placeholder="Last Name" name="lname" type="text" required>
                    </div>
                    <div class="form-group">
                        <input class="form-control" placeholder="Username" name="uname" type="text" required>
                    </div>
                    <div class="form-group">
                        <input class="form-control" placeholder="Email" name="email" type="email" required>
                    </div>
                    <div class="form-group">
                        <input class="form-control" placeholder="Password" name="psw" type="password" required>
                    </div>
                    <div class="form-group">
                        <input class="form-control" placeholder="Confirm Password" name="psw1" type="password" required>
                    </div>
                    <button class="send-btn" type="submit">Register</button>
                </form>
                <div style="margin-top: 20px;">
                    <p>Already have an account? <a href="/login">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
